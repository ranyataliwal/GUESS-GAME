<!DOCTYPE html>
<html>
<head>
<title>Guess Game</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background-color: #f2f2f2;
}

.box {
    background: white;
    padding: 20px;
    margin: 100px auto;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}

button {
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
}

input {
    padding: 8px;
}
</style>

</head>

<body>

<div class="box">
    <h2>🎮 Guess Number Game</h2>
    
    <p id="info">Attempts left: 5</p>
    
    <input type="number" id="guess" placeholder="Enter number (1-100)">
    <br>
    <button onclick="check()">Submit</button>
    <br>
    <button onclick="restart()">Restart</button>
    
    <p id="result"></p>
</div>

<script>
let mynumber = Math.floor(Math.random() * 100) + 1;
let attempts = 5;
let score = 50;

function check() {
    let usernumber = document.getElementById("guess").value;

    if(attempts <= 0) return;

    if(usernumber == 0){
        document.getElementById("result").innerText = "Game exited";
        return;
    }

    if(usernumber == mynumber){
        document.getElementById("result").innerText = "🎉 You Win! Score: " + score;
        return;
    } else {
        document.getElementById("result").innerText = "❌ Wrong, try again";
    }

    attempts--;
    score -= 10;

    document.getElementById("info").innerText = "Attempts left: " + attempts;

    if(attempts == 0){
        document.getElementById("result").innerText = "😢 Game Over! Number was: " + mynumber;
    }
}

function restart() {
    mynumber = Math.floor(Math.random() * 10) + 1;
    attempts = 5;
    score = 50;

    document.getElementById("info").innerText = "Attempts left: 5";
    document.getElementById("result").innerText = "";
    document.getElementById("guess").value = "";
}
</script>

</body>
</html>
